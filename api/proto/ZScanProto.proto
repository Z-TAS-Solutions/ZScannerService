syntax = "proto3";

package zscanproto;
option go_package = "./internal/pkg/zscanproto/";

message Empty {}

message Status {
  bool success = 1;
  string message = 2;
}

enum LEDStatus {
  VOID = 0;
  SUCCESS = 1;
  PENDING = 2;
  FAILED  = 3;
}

message LEDStatusRequest {
  LEDStatus status = 1;
}

message LEDState {
  uint32 red = 1;
  uint32 green = 2;
  uint32 blue = 3;
}


enum ToFState {
	ToFDisabled = 0;
	ToFEnabled = 1;
  ToFInactive = 2; 
	ToFActive = 3;
}

message ToFConfig {
  uint32 threshold = 1;
}


enum CamState {
  CAMREADY = 0;
  CAMACTIVE = 1;
  CAMINACTIVE = 2;
  CAMDISABLED = 3;
}

message CameraStatus {
  CamState state = 1;
  string message = 2;
}

message CameraConfig {
  uint32 width = 1;
  uint32 height = 2;
  uint32 fps = 3;
}


service ZPiController {
   rpc SetLEDStatus (LEDStatusRequest) returns (Status);
   rpc GetLED (Empty) returns (LEDState);

   rpc ConfigureToF (ToFConfig) returns (Status);
   rpc EnableToF (Empty) returns (Status);    
   rpc DisableToF (Empty) returns (Status);   
   rpc ActivateToF (Empty) returns (Status); 
   rpc DeactivateToF (Empty) returns (Status);

   rpc InitCamera (Empty) returns (Status);
   rpc CleanupCamera (Empty) returns (Status);
   rpc ActivateCamera (Empty) returns (Status);
   rpc DeactivateCamera (Empty) returns (Status);
   rpc ConfigureCamera (CameraConfig) returns (Status);
}
