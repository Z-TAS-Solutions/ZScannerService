syntax = "proto3";

package zscanproto;
option go_package = "./internal/pkg/zscanproto/";

message Empty {}

message Status {
  bool success = 1;
  string message = 2;
}

enum LEDStatus {
  VOID = 0;
  SUCCESS = 1;
  PENDING = 2;
  FAILED  = 3;
}

message LEDStatusRequest {
  LEDStatus status = 1;
}

message LEDState {
  uint32 red = 1;
  uint32 green = 2;
  uint32 blue = 3;
}

service ZPiController {
   rpc SetLEDStatus (LEDStatusRequest) returns (Status);
   rpc GetLED (Empty) returns (LEDState);
}
